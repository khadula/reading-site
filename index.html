<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Reading Room</h1>
        <div class="video-control">
            <input type="text" id="youtubeURL" placeholder="Paste YouTube URL">
            <button onclick="setVideo()">Set Video</button>
        </div>
    </header>

    <main class="container">
        <section class="video-wrapper">
            <iframe
                id="lofiPlayer"
                src=""
                frameborder="0"
                allowfullscreen>
            </iframe>
        </section>

        <aside class="timer-panel">
            <div class="timer-card">
                <h2>Reading Timer</h2>
                <div id="timer">00:00:00</div>
                <div class="controls">
                    <button class="start-btn" onclick="startTimer()">Start</button>
                    <button class="stop-btn" onclick="stopTimer()">Stop</button>
                </div>
            </div>

            <div class="sessions-card">
                <h3>Sessions</h3>
                <div class="list-container">
                    <ul id="sessionList"></ul>
                </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
