<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reading Room</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Reading Room</h1>

<div class="video-control">
<input type="text" id="youtubeURL" placeholder="Paste YouTube URL">
<button onclick="setVideo()">Set Video</button>
</div>

<div class="container">

<div class="video">
<iframe
id="lofiPlayer"
width="100%"
height="315"
src=""
frameborder="0"
allowfullscreen>
</iframe>
</div>

<div class="timer-panel">

<h2>Reading Timer</h2>

<div id="timer">00:00:00</div>

<button onclick="startTimer()">Start</button> <button onclick="stopTimer()">Stop</button>

<h3>Sessions</h3>
<ul id="sessionList"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
